name: Publish to PyPI

on:
  release:
    types: [published]

env:
  UV_VERSION: "0.9.21"
  UV_EXCLUDE_NEWER: "7 days"

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
          version: ${{ env.UV_VERSION }}

      - name: Build package
        run: uv build

      - name: Verify built distributions
        run: python scripts/verify_distribution.py dist/*.whl dist/*.tar.gz

      - name: Smoke test (wheel)
        run: |
          uv run --isolated --no-project --with dist/*.whl python -c "import article_extractor; print(f'Version: {article_extractor.__version__}')"

      - name: Smoke test (source distribution)
        run: |
          uv run --isolated --no-project --with dist/*.tar.gz python -c "import article_extractor; print(f'Version: {article_extractor.__version__}')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/article-extractor
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI with attestations
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
